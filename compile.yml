name: PS2_Build
on: [push]
jobs:
  build-volkov:
    runs-on: ubuntu-latest
    container: ps2dev/ps2sdk:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install gsKit and dependencies
        run: |
          apk add --no-cache git make gcc
          # Letöltjük és telepítjük a grafikus könyvtárat
          git clone https://github.com
          cd gsKit
          ./build.sh setup
          ./build.sh
          ./build.sh install
          cd ..
      - name: Compile ELF
        run: make
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: volkov-commander-ps2
          path: volkov.elf
